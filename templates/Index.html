<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🤖 ИИ-Помощник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: #313244;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            background: #1e1e2e;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #45475a;
        }
        .header h1 { font-size: 24px; color: #89b4fa; }
        .header p { font-size: 13px; color: #6c7086; }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
            line-height: 1.5;
        }
        .user { 
            background: #89b4fa; 
            color: #1e1e2e; 
            align-self: flex-end; 
        }
        .bot { 
            background: #45475a; 
            color: #cdd6f4; 
            align-self: flex-start; 
        }
        .sources { 
            font-size: 12px; 
            color: #a6adc8; 
            margin-top: 8px; 
        }
        .sources a { 
            color: #89b4fa; 
            text-decoration: none; 
        }
        .sources a:hover { text-decoration: underline; }
        .input-area {
            padding: 15px 20px;
            background: #1e1e2e;
            display: flex;
            gap: 10px;
            border-top: 2px solid #45475a;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #313244;
            color: #cdd6f4;
            font-size: 14px;
            outline: none;
        }
        .input-area input::placeholder {
            color: #6c7086;
        }
        .input-area button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #89b4fa;
            color: #1e1e2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .input-area button:hover { 
            transform: scale(1.02); 
            background: #74c7ec; 
        }
        .input-area button:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        .typing { 
            color: #6c7086; 
            font-style: italic; 
            align-self: flex-start; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; } 
        }
        /* Стиль для прокрутки */
        .chat::-webkit-scrollbar { width: 6px; }
        .chat::-webkit-scrollbar-track { background: #313244; }
        .chat::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🦆 ИИ-Помощник</h1>
        <p>Ищет ответы в интернете на русском языке</p>
    </div>
    
    <div class="chat" id="chat">
        <div class="message bot">
            Привет! Я ИИ-помощник с доступом к интернету.<br>
            Задайте вопрос на русском языке!
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="question" placeholder="Введите ваш вопрос..." 
               onkeypress="if(event.key==='Enter') sendQuestion()">
        <button id="sendBtn" onclick="sendQuestion()">📤 Отправить</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');
    
    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
    
    function addTyping() {
        const div = document.createElement('div');
        div.className = 'typing';
        div.id = 'typing';
        div.textContent = '⏳ Ищу информацию...';
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
    
    function removeTyping() {
        const typing = document.getElementById('typing');
        if (typing) typing.remove();
    }
    
    async function sendQuestion() {
        const question = input.value.trim();
        if (!question) return;
        
        input.value = '';
        addMessage(question, 'user');
        sendBtn.disabled = true;
        addTyping();
        
        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });
            const data = await response.json();
            
            removeTyping();
            
            let html = data.answer || '❌ Не удалось найти ответ';
            if (data.sources && data.sources.length > 0) {
                html += '<div class="sources">📚 Источники: ';
                data.sources.forEach((s, i) => {
                    html += `<a href="${s.link}" target="_blank">${i+1}</a> `;
                });
                html += '</div>';
            }
            addMessage(html, 'bot');
        } catch (error) {
            removeTyping();
            addMessage('❌ Ошибка соединения с сервером: ' + error.message, 'bot');
        }
        sendBtn.disabled = false;
        input.focus();
    }
</script>

</body>
</html>
